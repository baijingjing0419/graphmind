services:
  # ========================================
  # 基础设施
  # ========================================

  mongodb:
    image: mongo:7.0
    container_name: graphmind-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: graphmind
    volumes:
      - mongodb_data:/data/db
    networks:
      - graphmind-net
    healthcheck:
      test: ["CMD", "mongosh", "localhost:27017/test", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: graphmind-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - graphmind-net

  neo4j:
    image: neo4j:5.15.0
    container_name: graphmind-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - graphmind-net

  redis:
    image: redis:7
    container_name: graphmind-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - graphmind-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # 后端 API
  # ========================================

  api:
    build: .
    container_name: graphmind-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env.docker
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
    networks:
      - graphmind-net

  # ========================================
  # 前端
  # ========================================

  frontend:
    build: ./web-tanstack
    container_name: graphmind-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - graphmind-net

volumes:
  mongodb_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  uploads_data:
  logs_data:

networks:
  graphmind-net:
    driver: bridge
